<!DOCTYPE html> <!--indica que é um documento html, qual o tipo de documento-->
<html lang="pt-br"> <!--elemento raiz-->
<head> 
    <!-- sistema de codificação portugues-->
    <meta charset="utf-8">   
    <link rel="stylesheet" href="style.css">    
    <title>Cartão de Visitas</title>
</head> 
<body>
    <!--usar class tem a vantagem de reaproveitar oo estilo css-->
    <div class="card">    <!--delimitação lógica de uma área-->
        <img src="img.jpeg" alt="imagem não carregou" class="imagem"/>
        <h1>Olá, seja bem vindo(a)</h1>      <!--título-->  
        <p>Sou o Gabriel</p>   <!--parágrafos-->
        <p class="interesse">Meu interesse é trabalhar com back-end</p>
        <!--abre o link em uma nova aba-->
        <a target="_blank" href="https://github.com/dashboard">
        <!--botão dentro do link-->
            <a href="https://github.com/dashboard">
        <button>Acesse meu Github </button>
          </a>  
    </div> 
</body>
</html>
